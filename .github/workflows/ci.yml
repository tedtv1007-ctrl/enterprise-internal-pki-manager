name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  check_files:
    runs-on: ubuntu-latest
    outputs:
      has_python: ${{ steps.detect.outputs.has_python }}
      has_node: ${{ steps.detect.outputs.has_node }}
      has_dotnet: ${{ steps.detect.outputs.has_dotnet }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          echo "has_python=false" >> $GITHUB_OUTPUT
          echo "has_node=false" >> $GITHUB_OUTPUT
          echo "has_dotnet=false" >> $GITHUB_OUTPUT
          if [ -f requirements.txt ] || ls *.py >/dev/null 2>&1; then echo "has_python=true" >> $GITHUB_OUTPUT; fi
          if [ -f package.json ]; then echo "has_node=true" >> $GITHUB_OUTPUT; fi
          if ls *.sln >/dev/null 2>&1 || ls **/*.csproj 2>/dev/null | grep -q .; then echo "has_dotnet=true" >> $GITHUB_OUTPUT; fi

  test:
    runs-on: ubuntu-latest
    needs: check_files
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests (Python)
        if: needs.check_files.outputs.has_python == 'true'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pytest.ini ] || [ -d tests ] || ls *_test.py >/dev/null 2>&1; then
            pytest -q || (echo 'pytest failed' && exit 1)
          else
            echo 'No Python tests found; skipping'
          fi

      - name: Set up Node and Run tests (Node)
        if: needs.check_files.outputs.has_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Run Node tests
        if: needs.check_files.outputs.has_node == 'true'
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
            if grep -q '"test"' package.json; then
              npm test || (echo 'npm test failed' && exit 1)
            else
              echo 'No npm test script; skipping'
            fi
          else
            echo 'package.json not found; skipping Node tests'
          fi

      - name: Set up dotnet and Run tests
        if: needs.check_files.outputs.has_dotnet == 'true'
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      - name: dotnet test
        if: needs.check_files.outputs.has_dotnet == 'true'
        run: |
          find . -maxdepth 3 -type f -name '*.sln' -print -quit | read solution || true
          if [ -n "$solution" ]; then
            dotnet test "$solution" --no-build --verbosity minimal || exit 1
          else
            dotnet test || echo 'No dotnet solution found or tests skipped'
          fi
