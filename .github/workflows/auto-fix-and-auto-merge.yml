name: Auto Fix and Auto Merge

on:
  issues:
    types: [labeled]
  workflow_dispatch: {}

jobs:
  generate-and-pr:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'auto-fix'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Run generate patch script
        run: |
          chmod +x scripts/generate_patch.sh
          scripts/generate_patch.sh "$GITHUB_EVENT_PATH"
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run tests
        run: |
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f package.json ]; then npm ci || true; fi
          # repository-specific tests should be invoked here
      - name: Commit & Push branch
        run: |
          chmod +x scripts/commit_and_push.sh
          scripts/commit_and_push.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create PR
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Auto: fix generated by workflow"
          title: "Auto: fix for issue ${{ github.event.issue.number }}"
          body: |
            This PR was generated automatically by the auto-fix workflow.
            It targets issue #${{ github.event.issue.number }} and includes a proposed patch.
          base: main
          branch: auto/fix-issue-${{ github.event.issue.number }}
