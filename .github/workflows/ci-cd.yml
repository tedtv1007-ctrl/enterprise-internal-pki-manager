name: CI-CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/EnterprisePKI.sln

      - name: Build
        run: dotnet build src/EnterprisePKI.sln --configuration Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test src/EnterprisePKI.sln
          --configuration Release
          --no-build
          --filter "FullyQualifiedName!~E2E.Tests"
          --collect:"XPlat Code Coverage"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: |
            **/TestResults/**

  docker-validate:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose
        run: docker compose -f docker-compose.yml config

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      ASPNETCORE_ENVIRONMENT: Development
      E2E_BASE_URL: http://localhost:5261

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/EnterprisePKI.sln

      - name: Build
        run: dotnet build src/EnterprisePKI.sln --configuration Release --no-restore

      - name: Install Playwright browsers
        run: pwsh src/E2E.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps

      - name: Start Portal API
        run: dotnet run --project src/Portal/Portal.csproj --configuration Release --no-build --urls http://localhost:5069 > portal.log 2>&1 &

      - name: Start Portal UI
        run: dotnet run --project src/Portal.UI/Portal.UI/Portal.UI.csproj --configuration Debug --urls http://localhost:5261 > portal-ui.log 2>&1 &

      - name: Wait for services
        shell: bash
        run: |
          for url in http://localhost:5069/swagger http://localhost:5261; do
            echo "Waiting for $url"
            for i in {1..60}; do
              if curl -fsS "$url" > /dev/null; then
                echo "$url is ready"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "$url did not become ready in time"
                exit 1
              fi
              sleep 2
            done
          done

      - name: Run E2E tests
        run: dotnet test src/E2E.Tests/E2E.Tests.csproj --configuration Release --no-build

      - name: Upload E2E logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            portal.log
            portal-ui.log
            **/TestResults/**
